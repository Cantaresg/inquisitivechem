<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemistry Lab — InquisitiveChemistry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/chem-lab.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- ── Nav ──────────────────────────────────────────────────────────────── -->
  <nav>
    <a class="nav-logo" href="../../website/index.html">Inquisitive<span>Chemistry</span></a>
    <ul class="nav-links">
      <li><a href="../../website/index.html#simulations">Simulations</a></li>
      <li><a href="../../website/index.html#teachers">For Teachers</a></li>
      <li><a class="nav-cta" href="../../website/index.html#feedback">FEEDBACK</a></li>
      <li><button id="debug-log-nav-btn" type="button" hidden
                  aria-expanded="false" aria-controls="debug-log-panel"
                  title="Toggle reaction debug log">🔬 Debug Log</button></li>
    </ul>
  </nav>

  <div id="chem-lab-app">

    <!-- ── Title bar ─────────────────────────────────────────────────────── -->
    <header id="lab-title" aria-label="Application title">
      <span id="lab-title-icon" aria-hidden="true">⚗️</span>
      <h1 id="lab-title-text">Virtual Chemistry Lab</h1>
      <span id="lab-title-badge" aria-hidden="true">A-Level / IGCSE</span>
      <span id="lab-version"    aria-hidden="true">v0.2</span>
    </header>

    <!-- ── Left: chemical store ──────────────────────────────────────────── -->
    <aside id="chem-store" aria-label="Chemical store">
      <div id="chem-store-header" aria-hidden="true">Chemical Store</div>
      <div id="chem-store-tree" role="tree" aria-label="Available reagents"></div>
    </aside>

    <!-- ── Top centre: confirmatory test bar ─────────────────────────────── -->
    <div id="test-bar" role="toolbar" aria-label="Confirmatory tests — drag to a vessel"></div>

    <!-- ── Centre: lab bench ─────────────────────────────────────────────── -->
    <main id="bench-area" aria-label="Lab bench — drop reagents here to create vessels">
      <div id="bench-surface" aria-hidden="true"></div>
    </main>
    <!-- ── Lab action tools ──────────────────────────────────────────────────── -->
    <div id="lab-tools" role="toolbar" aria-label="Lab tools">
      <span class="lab-tools-hint">Select a tool, then click a vessel:</span>
      <button class="tool-btn" data-tool="heat"  type="button" title="Heat the vessel">🔥 Heat</button>
      <button class="tool-btn" data-tool="cool"  type="button" title="Cool the vessel">❄️ Cool</button>
      <button class="tool-btn" data-tool="swirl" type="button" title="Swirl the vessel (re-oxidises traffic light indicator)">🌀 Swirl</button>
      <button class="tool-btn" data-tool="wash"  type="button" title="Wash and discard vessel">✕ Wash</button>
    </div>
    <!-- ── Right: observation log ────────────────────────────────────────── -->
    <aside id="obs-panel" aria-label="Observation log">

      <div id="obs-panel-header" role="button" tabindex="0" aria-expanded="false"
           aria-controls="obs-tabs obs-list obs-equations obs-export-btn">
        <span id="obs-panel-title">Observations</span>
        <span id="obs-panel-chevron" aria-hidden="true">▾</span>
      </div>

      <div id="obs-tabs" role="tablist">
        <button class="obs-tab active"
                role="tab"
                aria-selected="true"
                aria-controls="obs-list"
                data-tab="observations">Observations</button>
        <button class="obs-tab"
                role="tab"
                aria-selected="false"
                aria-controls="obs-equations"
                data-tab="equations">Equations</button>
      </div>

      <div id="obs-list"      role="tabpanel" aria-label="Observations"
           aria-live="polite"></div>
      <div id="obs-equations" role="tabpanel" aria-label="Equations"
           aria-live="polite"></div>

      <button id="obs-export-btn" type="button">Export as .docx</button>

    </aside>

  </div><!-- /#chem-lab-app -->

  <!-- ── Debug reaction log panel ─────────────────────────────────────────── -->
  <aside id="debug-log-panel" aria-label="Reaction debug log" hidden>
    <div id="debug-log-header">
      <span id="debug-log-title">🔬 Reaction Debug Log</span>
      <div id="debug-log-actions">
        <button id="debug-log-export" type="button">Export .txt</button>
        <button id="debug-log-clear"  type="button">Clear</button>
        <button id="debug-log-close"  type="button" aria-label="Close debug panel">✕</button>
      </div>
    </div>
    <div id="debug-log-list"></div>
  </aside>

  <!-- ── Toast container ───────────────────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ── Screen-reader announcements (keyboard drag-drop) ──────────────────── -->
  <div id="aria-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <!-- ── Entry point ───────────────────────────────────────────────────────── -->
  <script type="module" src="ui/main.js"></script>

</body>
</html>
